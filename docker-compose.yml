services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: pb138-backend
    restart: unless-stopped
    # Pull environment variables directly from your host system or a root .env file
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      # No build args: VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY are read by
      # Vite directly from apps/frontend/.env during the build (single source
      # of truth) and inlined into the static bundle.
    container_name: pb138-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend